<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Rock Paper Scissors </title>
        <!-- <link href="https://cdn.tlm.cloud/bootstrap/5.2.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"> -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
            rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
            crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="./styles/main.css" />
        <link rel="icon" type="image/x-icon" href="./assets/favicon-32x32.png" />
    </head>

    <body>
        <!--------------------------------------------------------   Main Container  -------------------------------------------------------->
        <main class="container">
            <header class="title">
                <h2> Let's play... </h2>
                <h1> Rock Paper Scissors! </h1>
            </header>
            <section class="row">
                <aside class="col">
                    <h4 id="user-selection"> Make your selection: </h4>
                    <figure>
                        <img id="rock" class="rock-image select" src="./assets/rock.png" alt="rock">
                        <img id="paper" class="paper-image select" src="./assets/paper.png" alt="paper">
                        <img id="scissors" class="scissors-image select" src="./assets/scissors.png" alt="scissors">
                    </figure>
                </aside>
                <aside class="col">
                    <h4 id="computer-selection"> ...The computer chooses... </h4>
                    <figure>
                        <img id="computer-rock" class="rock-image hidden" src="./assets/rock.png" alt="rock">
                        <img id="computer-paper" class="paper-image hidden" src="./assets/paper.png" alt="paper">
                        <img id="computer-scissors" class="scissors-image hidden" src="./assets/scissors.png" alt="scissors">
                    </figure>
                </aside>
            </section>
            <!------------------------------------------------------  Scoreboard  -------------------------------------------------------->
            <section class="results">
                <h4 id="game-outcome"></h4>
                <h4 class="scoreboard">
                    <span id="win"></span>
                    Wins
                </h4>
                <h4 class="scoreboard">
                    <span id="tie"></span>
                    Ties
                </h4>
                <h4 class="scoreboard">
                    <span id="loss"></span>
                    Losses
                </h4>
            </section>
            <!------------------------------------------------------  End of Scoreboard  -------------------------------------------------------->

            <button id="play-again" class="btn btn-light"> Play Again </button> <!-- Button to Play another round -->
        </main>
        <!--------------------------------------------------------   End of Main Container  -------------------------------------------------------->

        <!--------------------------------------------------------  Links  -------------------------------------------------------->
        <!-- <script src="https://cdn.tlm.cloud/bootstrap/5.2.3/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script> -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"></script>
        <script src="./javascript/main.js"></script>

        <!--------------------------------------------------------  End of Links  -------------------------------------------------------->

    </body>

</html>
